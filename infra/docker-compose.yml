# Local development stack for the IoT PdM pipeline.
#
# Brings up:
#   - EMQX 5.x MQTT broker on 1883 (MQTT) and 18083 (dashboard).
#   - Apache Kafka in KRaft single-broker mode on 9092.
#   - TimescaleDB on 5432 with pre-configured pdm database.
#   - Grafana on 3000 with TimescaleDB data source pre-provisioned.
#
# Bring up:
#   docker compose up -d
# Tear down (keep volumes):
#   docker compose down
# Tear down (wipe data):
#   docker compose down -v

services:
  emqx:
    image: emqx/emqx:5.5
    container_name: pdm-emqx
    ports:
      - "1883:1883"     # MQTT
      - "8083:8083"     # MQTT over WebSocket
      - "18083:18083"   # Dashboard
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: pdm-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:19092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      CLUSTER_ID: pdm-cluster-id-0000001

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pdm-timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=pdm
      - POSTGRES_USER=pdm
      - POSTGRES_PASSWORD=pdm
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:10.4.0
    container_name: pdm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=pdm
      - GF_RENDERING_SERVER_URL=http://grafana-renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_LOG_FILTERS=rendering:debug
    depends_on:
      - timescaledb
      - grafana-renderer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  grafana-renderer:
    image: grafana/grafana-image-renderer:3.10.4
    container_name: pdm-grafana-renderer
    environment:
      - ENABLE_METRICS=false
    ports:
      - "8081:8081"
